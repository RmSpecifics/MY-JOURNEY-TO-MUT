<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reagiles To Mangosuthu</title>
<style>
  :root{
    --black: #0a0a0a;
    --panel: #141414;
    --panel-2: #1c1c1c;
    --line: #333333;
    --white: #f4f4f2;
    --grey: #8f8f8f;
    --blue: #4a7fb5;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--black);
    color:var(--white);
    font-family:'Segoe UI',Arial,sans-serif;
    min-height:100vh;
    padding:24px 16px 80px;
  }
  .wrap{max-width:920px;margin:0 auto;}

  /* ===== Boarding pass header ===== */
  .pass{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px 28px 22px;
    position:relative;
    overflow:hidden;
    margin-bottom:28px;
  }
  .pass::before{
    content:"";
    position:absolute; inset:0;
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0 2px, transparent 2px 14px);
    pointer-events:none;
  }
  .eyebrow{
    font-family:'Courier New',monospace;
    letter-spacing:3px;
    font-size:11px;
    color:var(--grey);
    text-transform:uppercase;
  }
  .title{
    font-family:'Arial Black','Segoe UI',sans-serif;
    font-weight:900;
    font-size:clamp(28px,6vw,46px);
    letter-spacing:1px;
    margin:6px 0 18px;
    text-transform:uppercase;
  }
  .route{
    display:flex; align-items:center; gap:14px;
    margin:18px 0 10px;
  }
  .airport{
    font-family:'Courier New',monospace;
    font-weight:700; font-size:22px;
    text-align:center;
  }
  .airport small{
    display:block; font-size:10px; color:var(--grey); font-weight:400; letter-spacing:1px; margin-top:2px;
  }
  .track{
    flex:1; position:relative; height:2px;
    background:repeating-linear-gradient(90deg, var(--line) 0 8px, transparent 8px 14px);
  }
  .plane{
    position:absolute; top:50%; left:0%;
    transform:translate(-50%,-50%) rotate(90deg);
    font-size:20px;
    transition:left 0.6s ease;
    filter:grayscale(1) brightness(2);
  }
  .meta-row{
    display:flex; flex-wrap:wrap; gap:24px;
    margin-top:20px; padding-top:16px;
    border-top:1px dashed var(--line);
    font-family:'Courier New',monospace;
    font-size:12px;
  }
  .meta-row div span{
    display:block; color:var(--grey); font-size:10px; letter-spacing:2px; margin-bottom:4px;
  }
  .progress-num{font-size:16px; font-weight:700;}

  /* ===== Grid ===== */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
    gap:16px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    cursor:pointer;
    text-align:left;
    color:var(--white);
    font-family:inherit;
    position:relative;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .card:hover{
    transform:translateY(-3px);
    border-color:var(--white);
    background:var(--panel-2);
  }
  .card .icon{font-size:26px; display:block; margin-bottom:10px;}
  .card h3{font-size:15px; letter-spacing:.5px; text-transform:uppercase; margin-bottom:8px;}
  .card .count{font-family:'Courier New',monospace; font-size:12px; color:var(--grey);}
  .bar-bg{height:4px; background:#2a2a2a; border-radius:2px; margin-top:12px; overflow:hidden;}
  .bar-fill{height:100%; background:var(--white); width:0%; transition:width .3s ease;}

  .card.eng{
    border:1px solid var(--blue);
    background:linear-gradient(160deg, var(--panel) 60%, #10161d);
  }
  .card.eng:hover{border-color:var(--blue); box-shadow:0 0 0 1px var(--blue) inset;}
  .card.eng .icon{transition:transform .4s ease;}
  .card.eng:hover .icon{transform:rotate(90deg);}
  .card.eng .count{color:var(--blue);}
  .card.eng .bar-fill{background:var(--blue);}
  .eng-tag{
    position:absolute; top:14px; right:14px;
    font-family:'Courier New',monospace; font-size:9px;
    color:var(--blue); letter-spacing:1px; border:1px solid var(--blue);
    padding:2px 6px; border-radius:20px;
  }

  /* ===== Modal (pop-up) ===== */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    display:none; align-items:center; justify-content:center;
    padding:20px; z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{
    background:var(--panel); border:1px solid var(--line);
    border-radius:14px; width:100%; max-width:460px;
    max-height:82vh; overflow-y:auto;
    padding:26px;
  }
  .modal-head{
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:16px; padding-bottom:14px; border-bottom:1px dashed var(--line);
  }
  .modal-head h2{font-size:19px; text-transform:uppercase; letter-spacing:.5px;}
  .close-btn{
    background:var(--white); color:var(--black); border:none;
    width:30px;height:30px;border-radius:50%; font-size:16px; cursor:pointer; font-weight:700;
    flex-shrink:0;
  }
  .item-row{
    display:flex; align-items:center; gap:12px;
    padding:11px 4px; border-bottom:1px solid #222;
    font-size:14px;
  }
  .item-row:last-child{border-bottom:none;}
  .item-row input{
    width:18px; height:18px; accent-color:var(--white); flex-shrink:0; cursor:pointer;
  }
  .item-row label{cursor:pointer; flex:1;}
  .item-row.checked label{color:var(--grey); text-decoration:line-through;}
  .owned-badge{
    font-size:9px; font-family:'Courier New',monospace; color:var(--black);
    background:var(--white); padding:2px 6px; border-radius:10px; letter-spacing:1px;
  }

  footer{
    text-align:center; margin-top:36px; color:var(--grey);
    font-family:'Courier New',monospace; font-size:11px; letter-spacing:1px;
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="pass">
    <div class="eyebrow">Boarding Pass · Diploma in Mechanical Engineering</div>
    <div class="title">Reagiles To Mangosuthu</div>

    <div class="route">
      <div class="airport">PTA<small>Pretoria</small></div>
      <div class="track"><span class="plane" id="planeIcon">&#9992;</span></div>
      <div class="airport">MUT<small>Mangosuthu</small></div>
    </div>

    <div class="meta-row">
      <div><span>Departs</span> Friday</div>
      <div><span>Countdown</span> <span id="countdown">--</span></div>
      <div><span>Packed</span> <span class="progress-num" id="overallPct">0%</span></div>
    </div>
  </div>

  <div class="grid" id="cardGrid"></div>

  <footer>Tap a category to open the checklist · progress saves as you check items in this session</footer>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle"></h2>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const categories = [
  { id:"clothing", icon:"&#128085;", name:"Clothing", items:[
    "Everyday outfits (7–10 sets)","Formal wear (interviews/presentations)","Warm jacket / hoodie",
    "Rain jacket or poncho (Durban rain)","Overalls / work clothes for practicals","Sleepwear",
    "Underwear & socks (10+ days)","Swimwear (coastal town)","Closed comfortable shoes","Steel-toe safety boots (workshop)"
  ]},
  { id:"bedding", icon:"&#128719;", name:"Bedding & Linen", items:[
    "Duvet / comforter","Pillow + 2 pillowcases","Fitted & flat bedsheets","Mattress protector",
    "Extra blanket","Laundry bag"
  ]},
  { id:"kitchen", icon:"&#127860;", name:"Kitchen & Cutlery", items:[
    "Fridge (already have)","Kettle (already have)","Plates & bowls","Cups / mugs",
    "Cutlery set (knife, fork, spoon)","Small pot & pan","Dish soap & sponge","Food storage containers","Can/bottle opener"
  ], owned:["Fridge (already have)","Kettle (already have)"] },
  { id:"toiletries", icon:"&#129529;", name:"Toiletries", items:[
    "Toothbrush & toothpaste","Soap / body wash","Shampoo & conditioner","Deodorant",
    "Bath towel & face towel","Razor","Basic first-aid kit (plasters, painkillers)","Sanitary products"
  ]},
  { id:"electronics", icon:"&#128268;", name:"Electronics & Appliances", items:[
    "Iron (already have)","Laptop + charger","Phone + charger","Extension cord / multi-plug",
    "Power bank","Headphones","Study desk lamp"
  ], owned:["Iron (already have)"] },
  { id:"docs", icon:"&#128196;", name:"Documents & Admin", items:[
    "ID book / card","Registration / acceptance letter","NSFAS or funding documents","Matric certificate & transcripts",
    "Passport-sized photos","Medical aid / health details","Emergency contact list","Proof of banking / bank card"
  ]},
  { id:"engineering", icon:"&#9881;", name:"Mechanical Engineering Kit", special:true, items:[
    "Scientific calculator (non-programmable, exam-approved)","Engineering drawing set (compass, protractor, set squares)",
    "Graph paper / engineering pad","Lab coat / overalls","Safety goggles","Steel-toe safety boots",
    "Notebooks & pens","USB flash drive","Engineer's scale ruler + 30cm ruler","Small toolkit (screwdrivers, pliers)"
  ]},
  { id:"room", icon:"&#128230;", name:"Room & Storage", items:[
    "Suitcase / storage boxes","Padlock (locker/cupboard)","Hangers","Laundry basket",
    "Mini broom / cleaning kit","Bin & bin bags","Small mirror"
  ]},
  { id:"travel", icon:"&#9992;", name:"Travel Day Essentials", items:[
    "Travel bag / hand luggage","Snacks & water for the trip","Cash + card","Chronic medication (if any)","Umbrella"
  ]}
];

const state = {}; // in-memory only, resets on refresh
categories.forEach(c => {
  state[c.id] = {};
  c.items.forEach(i => { state[c.id][i] = (c.owned && c.owned.includes(i)) ? true : false; });
});

function countChecked(cat){
  return Object.values(state[cat.id]).filter(Boolean).length;
}
function totalItems(){
  return categories.reduce((s,c) => s + c.items.length, 0);
}
function totalChecked(){
  return categories.reduce((s,c) => s + countChecked(c), 0);
}

function renderGrid(){
  const grid = document.getElementById("cardGrid");
  grid.innerHTML = "";
  categories.forEach(c => {
    const checked = countChecked(c);
    const pct = Math.round((checked / c.items.length) * 100);
    const card = document.createElement("button");
    card.className = "card" + (c.special ? " eng" : "");
    card.onclick = () => openModal(c.id);
    card.innerHTML = `
      ${c.special ? '<span class="eng-tag">DIPLOMA</span>' : ''}
      <span class="icon">${c.icon}</span>
      <h3>${c.name}</h3>
      <div class="count">${checked} / ${c.items.length} packed</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
    `;
    grid.appendChild(card);
  });
  updateOverall();
}

function openModal(catId){
  const c = categories.find(x => x.id === catId);
  document.getElementById("modalTitle").innerHTML = c.icon + " " + c.name;
  const body = document.getElementById("modalBody");
  body.innerHTML = "";
  c.items.forEach((item, idx) => {
    const row = document.createElement("div");
    const isChecked = state[c.id][item];
    row.className = "item-row" + (isChecked ? " checked" : "");
    const owned = c.owned && c.owned.includes(item);
    row.innerHTML = `
      <input type="checkbox" id="${c.id}-${idx}" ${isChecked ? "checked" : ""}>
      <label for="${c.id}-${idx}">${item}</label>
      ${owned ? '<span class="owned-badge">OWNED</span>' : ''}
    `;
    row.querySelector("input").addEventListener("change", (e) => {
      state[c.id][item] = e.target.checked;
      row.classList.toggle("checked", e.target.checked);
      renderGrid();
    });
    body.appendChild(row);
  });
  document.getElementById("overlay").classList.add("open");
}
function closeModal(){
  document.getElementById("overlay").classList.remove("open");
}
document.getElementById("overlay").addEventListener("click", (e) => {
  if(e.target.id === "overlay") closeModal();
});

function updateOverall(){
  const pct = Math.round((totalChecked() / totalItems()) * 100);
  document.getElementById("overallPct").textContent = pct + "%";
  document.getElementById("planeIcon").style.left = pct + "%";
}

function nextFriday(){
  const now = new Date();
  const day = now.getDay(); // 0 Sun ... 5 Fri
  let diff = (5 - day + 7) % 7;
  if(diff === 0) diff = 7; // if today is Friday, count to next week's? we want THIS friday if still upcoming
  if(day === 5) diff = 0;
  const target = new Date(now);
  target.setDate(now.getDate() + diff);
  target.setHours(0,0,0,0);
  return target;
}
function updateCountdown(){
  const now = new Date();
  const target = nextFriday();
  const msDiff = target - now;
  const days = Math.ceil(msDiff / (1000*60*60*24));
  document.getElementById("countdown").textContent = days <= 0 ? "Departure day" : days + (days===1 ? " day" : " days");
}

renderGrid();
updateCountdown();
setInterval(updateCountdown, 60000);
</script>
</body>
</html>
